version: '3.8'

services:
  cui-tools:
    # Use CPU only image for environments without NVIDIA GPU
    image: python:3.12-slim
    build:
      context: .
      dockerfile: Dockerfile
    # Overwrite the base image in Dockerfile to python:3.12-slim
    build:
      context: .
      dockerfile_inline: |
        FROM python:3.12-slim
        
        RUN apt-get update && apt-get install -y \
            curl \
            ffmpeg \
            && rm -rf /var/lib/apt/lists/*
        
        RUN curl -LsSf https://astral.sh/uv/install.sh | sh
        ENV PATH="/root/.local/bin:${PATH}"
        
        WORKDIR /workspace
        
        RUN uv tool install yt-dlp
        ENV PATH="/root/.local/bin:${PATH}"
        
        ENTRYPOINT ["tail", "-f", "/dev/null"]
    
    # Remove GPU resource reservation by overriding deploy section
    deploy:
      resources:
        reservations: {}
