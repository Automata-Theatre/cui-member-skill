version: '3.8'

services:
  whisper-gpu:
    image: pytorch/pytorch:2.3.1-cuda12.1-cudnn8-runtime
    container_name: whisper-gpu
    volumes:
      - .:/workspace
    working_dir: /workspace
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    entrypoint: ["tail", "-f", "/dev/null"]
